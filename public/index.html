<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>にちじょうタスク</title>
<link rel="stylesheet" href="/public/style.css"/>
</head>
<body>
<div class="app" id="app">

<!-- ═══ FOCUS ═══ -->
<div class="screen active" id="sc-f">
  <div class="topbar">
    <span class="tb-title" id="f-date">読み込み中...</span>
    <button class="tb-btn btn-te" onclick="showList()">リスト ›</button>
  </div>
  <div class="clock-bar">
    <span class="clock-time" id="clock">--:--</span>
    <span class="clock-next" id="f-next">次の予定：なし</span>
  </div>

  <div class="interrupt int-urgent" id="int-u">
    <div class="int-icon int-icon-u">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="4.5" x2="8" y2="8.5"/><circle cx="8" cy="11" r=".7" fill="#fff"/></svg>
    </div>
    <div class="int-body">
      <div class="int-badge ib-u" id="iu-badge">期限が迫っています！</div>
      <div class="int-name" id="iu-name">—</div>
      <div class="int-sub" id="iu-sub">—</div>
    </div>
    <div class="int-acts">
      <button class="ib ib-do" onclick="doInt('u')">今やる</button>
      <button class="ib ib-later" onclick="dimInt('u')">後で</button>
    </div>
  </div>

  <div class="interrupt int-routine" id="int-r">
    <div class="int-icon int-icon-r">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><polyline points="8,4.5 8,8 11,9.5"/></svg>
    </div>
    <div class="int-body">
      <div class="int-badge ib-r">定期タスクの時間です</div>
      <div class="int-name" id="ir-name">—</div>
      <div class="int-sub" id="ir-sub">—</div>
    </div>
    <div class="int-acts">
      <button class="ib ib-do-r" onclick="doInt('r')">今やる</button>
      <button class="ib ib-later" onclick="dimInt('r')">後で</button>
    </div>
  </div>

  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="f-prog" style="width:0%"></div></div>
    <span class="prog-txt" id="f-prog-lbl">0 / 0</span>
  </div>

  <div class="focus-card" id="f-card">
    <div class="burst"><div class="bring" id="burst"></div></div>
    <div class="f-hint">いまやること</div>
    <div class="f-name" id="f-name">よみこみ中...</div>
    <div class="f-pills" id="f-pills"></div>
    <button class="done-btn" id="done-btn" onclick="completeTask()">できた！</button>
  </div>
  <div class="sub-row">
    <button class="sub-btn" onclick="skipTask()">あとで ›</button>
    <button class="sub-btn" onclick="showList()">リスト ›</button>
    <button class="sub-btn" onclick="showCal()">カレンダー ›</button>
  </div>
</div>

<!-- ═══ LIST ═══ -->
<div class="screen" id="sc-l">
  <div class="topbar">
    <button class="tb-btn btn-pu" onclick="showFocus()">‹ フォーカスへ</button>
    <span class="tb-title">タスク一覧</span>
    <button class="tb-btn btn-te" onclick="openForm()">＋ ついか</button>
  </div>

  <div class="add-form" id="add-form">
    <div class="fg">
      <input class="fi" id="fn" placeholder="タスク名を入力..." />
      <div class="frow">
        <select id="fd"><option value="easy">かんたん</option><option value="mid" selected>ふつう</option><option value="hard">むずかしい</option></select>
        <select id="fc"><option>そうじ</option><option>かたづけ</option><option>料理</option><option>健康</option><option>その他</option></select>
        <select id="fdu"><option>5分</option><option selected>10分</option><option>20分</option><option>30分</option><option>60分</option></select>
      </div>
      <div class="type-tabs">
        <button class="ttab on" onclick="setType('normal',this)">通常</button>
        <button class="ttab" onclick="setType('timed',this)">期限あり</button>
        <button class="ttab" onclick="setType('repeat',this)">定期くりかえし</button>
      </div>
      <div class="ef" id="ef-t">
        <span class="flbl">日付・開始・終了</span>
        <div class="frow">
          <input type="date" id="ft-date"/>
          <input type="time" id="ft-s" value="09:00"/>
          <input type="time" id="ft-e" value="10:00"/>
        </div>
        <span class="flbl">割り込み通知</span>
        <div class="frow">
          <select id="ft-al"><option value="5">5分前</option><option value="15" selected>15分前</option><option value="30">30分前</option><option value="60">1時間前</option></select>
        </div>
      </div>
      <div class="ef" id="ef-r">
        <span class="flbl">くりかえし</span>
        <div class="frow">
          <select id="fr-unit" onchange="onRunit()"><option value="hour">時間ごと</option><option value="day" selected>日ごと</option><option value="week">週ごと</option><option value="month">月ごと</option></select>
          <input type="number" id="fr-n" value="1" min="1" max="99" style="max-width:60px;"/>
          <span id="fr-lbl" style="font-size:12px;color:var(--t2);align-self:center;">日</span>
        </div>
        <div id="wd-wrap" style="display:none">
          <span class="flbl">曜日</span>
          <div class="wdays" style="margin-top:4px;">
            <div class="wd" data-d="0" onclick="this.classList.toggle('on')">月</div>
            <div class="wd" data-d="1" onclick="this.classList.toggle('on')">火</div>
            <div class="wd" data-d="2" onclick="this.classList.toggle('on')">水</div>
            <div class="wd" data-d="3" onclick="this.classList.toggle('on')">木</div>
            <div class="wd" data-d="4" onclick="this.classList.toggle('on')">金</div>
            <div class="wd" data-d="5" onclick="this.classList.toggle('on')">土</div>
            <div class="wd" data-d="6" onclick="this.classList.toggle('on')">日</div>
          </div>
        </div>
        <span class="flbl">通知時刻</span>
        <div class="frow"><input type="time" id="fr-t" value="08:00"/></div>
      </div>
      <div class="fbtns">
        <button class="fcancel" onclick="closeForm()">キャンセル</button>
        <button class="fsave" onclick="saveTask()">追加する</button>
      </div>
    </div>
  </div>

  <div class="sort-tabs">
    <button class="stab on" onclick="setSort('manual',this)">手動</button>
    <button class="stab" onclick="setSort('deadline',this)">期限順</button>
    <button class="stab" onclick="setSort('diff',this)">難易度</button>
    <button class="stab" onclick="setSort('time',this)">時間順</button>
    <button class="stab" onclick="setSort('cat',this)">カテゴリ</button>
  </div>
  <div class="task-list" id="tl"></div>
  <button class="start-btn" onclick="showFocus()">このじゅんばんでスタート ›</button>
</div>

<!-- ═══ DONE ═══ -->
<div class="screen" id="sc-d">
  <div class="done-screen">
    <div class="done-title">きょうもおつかれさま！</div>
    <div class="done-sub" id="d-sub">まとめ</div>
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-val" id="d-cnt">0</div><div class="sum-lbl">タスク完了</div></div>
      <div class="sum-card"><div class="sum-val" id="d-min">0</div><div class="sum-lbl">合計（分）</div></div>
      <div class="sum-card"><div class="sum-val" id="d-streak">0</div><div class="sum-lbl">れんぞく日</div></div>
    </div>
    <div class="streak-section">
      <div class="sr-head">
        <span class="sr-title">れんぞくきろく</span>
        <span class="sr-num" id="d-streak-num">🔥 0日</span>
      </div>
      <div class="dots" id="d-dots"></div>
    </div>
    <div class="log-wrap">
      <div class="log-lbl">きょうのきろく</div>
      <div id="d-log"></div>
    </div>
    <div class="done-acts">
      <button class="da-btn da-p" onclick="showFocus()">フォーカスに戻る</button>
      <button class="da-btn da-s" onclick="showList()">タスク一覧を見る</button>
      <button class="da-btn da-s" onclick="showCal()">カレンダーを見る</button>
    </div>
  </div>
</div>

<!-- ═══ CALENDAR ═══ -->
<div class="screen" id="sc-c">
  <div class="topbar">
    <button class="tb-btn btn-pu" onclick="showFocus()">‹ フォーカスへ</button>
    <span class="tb-title">カレンダー</span>
    <button class="tb-btn btn-te" onclick="showList()">リスト ›</button>
  </div>
  <div class="cal-view-tabs">
    <button class="cvtab on" id="cvtab-month" onclick="setCalView('month',this)">月</button>
    <button class="cvtab" id="cvtab-week" onclick="setCalView('week',this)">週</button>
  </div>
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
    <span class="cal-nav-title" id="cal-nav-title">2026年4月</span>
    <button class="cal-nav-btn" onclick="calMove(1)">›</button>
  </div>
  <div id="cal-month-wrap">
    <div class="cal-grid-wrap">
      <div class="cal-weekdays">
        <div class="cal-wd weekend">日</div>
        <div class="cal-wd">月</div><div class="cal-wd">火</div><div class="cal-wd">水</div>
        <div class="cal-wd">木</div><div class="cal-wd">金</div>
        <div class="cal-wd weekend">土</div>
      </div>
      <div class="cal-cells" id="cal-cells"></div>
    </div>
  </div>
  <div id="cal-week-wrap" style="display:none">
    <div class="week-grid">
      <div class="week-header" id="week-header"></div>
      <div class="week-body" id="week-body"></div>
    </div>
  </div>
  <div class="day-panel" id="day-panel" style="display:none">
    <div class="dp-head">
      <span class="dp-title" id="dp-title">—</span>
      <button class="dp-close" onclick="document.getElementById('day-panel').style.display='none'">×</button>
    </div>
    <div id="dp-items"></div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--t2);padding:0 2px 4px;">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--pu);display:inline-block;"></span>通常</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--co);display:inline-block;"></span>期限あり</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--te);display:inline-block;"></span>定期</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--gr);display:inline-block;"></span>完了</span>
  </div>
</div>

</div>
<div class="err-toast" id="err-toast">エラーが発生しました</div>

<script src="/public/app.js"></script>
</body>
</html>
